<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刀盾工作台</title>
<style>
  :root{
    --ink:#1a1a1a; --paper:#f5f2ec; --card:#fffdf9;
    --sword:#b8442e; --shield:#2f5d50; --gold:#c08a2d;
    --line:#ddd6c8; --mute:#8a8478; --warn:#c0392b; --ok:#2f7d4f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.5;
    padding-bottom:80px; max-width:680px; margin:0 auto;
  }
  header{padding:22px 20px 14px; border-bottom:2px solid var(--ink); position:relative}
  .title{font-size:24px; font-weight:800; letter-spacing:1px; display:flex; align-items:center; gap:8px}
  .title .ji{color:var(--sword)} .title .dun{color:var(--shield)}
  .sub{font-size:12px; color:var(--mute); margin-top:4px}
  .updated{font-size:11px; color:var(--mute); margin-top:2px; font-variant-numeric:tabular-nums}

  .tabs{display:flex; position:sticky; top:0; z-index:20;
    background:var(--paper); border-bottom:1px solid var(--line)}
  .tab{flex:1; text-align:center; padding:14px 0; font-size:15px; font-weight:600;
    color:var(--mute); border-bottom:3px solid transparent; cursor:pointer; transition:.15s}
  .tab.on{color:var(--ink); border-bottom-color:var(--sword)}
  .page{display:none; padding:16px} .page.on{display:block}

  .posture{display:flex; gap:10px; margin-bottom:16px}
  .pcell{flex:1; background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; overflow:hidden}
  .pcell .lab{font-size:12px; color:var(--mute)}
  .pcell .val{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px}
  .pcell.sword{border-left:4px solid var(--sword)} .pcell.sword .val{color:var(--sword)}
  .pcell.shield{border-left:4px solid var(--shield)} .pcell.shield .val{color:var(--shield)}
  .pcell .hint{font-size:11px; color:var(--mute); margin-top:2px}

  .card{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:15px 16px; margin-bottom:12px}
  .card.dead{opacity:.62}
  .crow{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
  .name{font-size:18px; font-weight:800}
  .code{font-size:12px; color:var(--mute); font-weight:500; margin-left:6px}
  .tag{font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap}
  .tag.sword{background:rgba(184,68,46,.12); color:var(--sword)}
  .tag.shield{background:rgba(47,93,80,.12); color:var(--shield)}
  .line2{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 8px}
  .chip{font-size:12px; padding:3px 9px; border-radius:6px; background:#efe9dd; color:#5a5448}
  .chip b{color:var(--ink)}
  .logic{font-size:13.5px; margin:8px 0; padding:9px 11px; border-radius:8px;
    background:#faf7f0; border-left:3px solid var(--line)}
  .logic.on{border-left-color:var(--ok)} .logic.off{border-left-color:var(--warn)}
  .logic .k{font-weight:700; font-size:12px; letter-spacing:.5px}
  .logic.on .k{color:var(--ok)} .logic.off .k{color:var(--warn)}
  .foot{display:flex; align-items:center; justify-content:space-between; margin-top:10px;
    padding-top:10px; border-top:1px dashed var(--line)}
  .hold{font-size:12.5px; color:#5a5448} .hold b{color:var(--ink)}
  .act{font-size:13px; font-weight:800; padding:5px 14px; border-radius:8px}
  .act.hold{background:#eef2ed; color:var(--shield)}
  .act.cut{background:#fbe9e7; color:var(--warn)}
  .act.watch{background:#fdf3e0; color:var(--gold)}
  .act.add{background:#e9f3ec; color:var(--ok)}
  .panic{font-size:11px; color:var(--mute); margin-top:7px; font-variant-numeric:tabular-nums}

  .sig-hd{font-size:13px; font-weight:800; letter-spacing:1px; color:var(--mute);
    margin:20px 2px 8px; text-transform:uppercase}
  .sig-hd:first-child{margin-top:2px}

  .tempo{background:var(--ink); color:var(--paper); border-radius:12px; padding:15px 16px; margin-bottom:6px}
  .tempo .big{font-size:17px; font-weight:800; margin-bottom:5px}
  .tempo .desc{font-size:13px; opacity:.85; line-height:1.6}

  .cyc{display:flex; gap:8px; margin-bottom:6px}
  .cyc div{flex:1; text-align:center; padding:11px 6px; border-radius:9px; font-size:12px;
    background:var(--card); border:1px solid var(--line); color:var(--mute)}
  .cyc div.on{background:var(--ink); color:var(--paper); border-color:var(--ink); font-weight:700}
  .cyc div .big{display:block; font-size:15px; font-weight:800; margin-bottom:2px}

  /* 剧本卡 */
  .play{background:var(--card); border:1px solid var(--line); border-radius:11px;
    padding:14px 15px; margin-bottom:10px; border-left:4px solid var(--line)}
  .play.p1{border-left-color:var(--gold)}
  .play.p2{border-left-color:var(--ok)}
  .play.p3{border-left-color:var(--warn)}
  .play .ph{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .play .pn{font-size:15px; font-weight:800}
  .play .prob{margin-left:auto; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;
    background:#efe9dd; color:#5a5448}
  .play.p2 .prob{background:#e9f3ec; color:var(--ok)}
  .play.p3 .prob{background:#fbe9e7; color:var(--warn)}
  .play .pbody{font-size:13px; color:#5a5448; line-height:1.6}
  .play .pact{font-size:12.5px; font-weight:700; margin-top:7px; padding-top:7px; border-top:1px dashed var(--line)}
  .play.p1 .pact{color:var(--gold)} .play.p2 .pact{color:var(--ok)} .play.p3 .pact{color:var(--warn)}

  /* 龙头预警 */
  .alert{background:#fbe9e7; border:1px solid #e8c4bd; border-radius:11px; padding:13px 15px; margin-bottom:6px}
  .alert .ah{font-size:14px; font-weight:800; color:var(--warn); margin-bottom:4px; display:flex; align-items:center; gap:6px}
  .alert .abody{font-size:12.5px; color:#7a3b30; line-height:1.6}

  /* 方向卡 */
  .dir{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:13px 15px; margin-bottom:9px}
  .dir .dh{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .dir .rank{font-size:11px; font-weight:800; color:#fff; background:var(--sword); width:20px; height:20px;
    border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0}
  .dir .dn{font-size:15px; font-weight:800}
  .dir .dbadge{margin-left:auto; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px;
    background:rgba(47,125,79,.12); color:var(--ok)}
  .dir .dbody{font-size:12.5px; color:#5a5448; line-height:1.6}
  .dir .dkey{font-size:12px; margin-top:6px; padding:7px 10px; background:#faf7f0; border-radius:7px;
    border-left:3px solid var(--gold); color:#6a5a38}
  .dir .dkey b{color:var(--gold)}

  .mainline{background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; margin-bottom:9px; display:flex; align-items:center; gap:12px}
  .mainline .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0}
  .mainline .nm{font-weight:800; font-size:14.5px}
  .mainline .st{font-size:12px; color:var(--mute); margin-top:2px}
  .mainline .badge{margin-left:auto; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px}

  .timept{background:var(--card); border:1px solid var(--line); border-radius:9px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px}
  .timept .d{font-size:13px; font-weight:800; color:var(--sword); font-variant-numeric:tabular-nums; min-width:54px}
  .timept .ev{font-size:13.5px}
  .timept .ev small{display:block; color:var(--mute); font-size:11px; margin-top:1px}

  /* 词典 */
  .dict-item{background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; overflow:hidden}
  .dict-q{padding:12px 15px; font-size:14px; font-weight:700; cursor:pointer; display:flex;
    align-items:center; justify-content:space-between; gap:10px}
  .dict-q .arr{font-size:12px; color:var(--mute); transition:transform .2s; flex-shrink:0}
  .dict-item.open .dict-q .arr{transform:rotate(90deg)}
  .dict-a{max-height:0; overflow:hidden; transition:max-height .25s ease; font-size:13px;
    color:#5a5448; line-height:1.65}
  .dict-item.open .dict-a{max-height:400px}
  .dict-a-inner{padding:0 15px 13px}
  .dict-q .badge{font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; margin-left:auto;
    background:#efe9dd; color:var(--mute)}

  .quote{margin:22px 2px 0; padding:14px 16px; background:#efe9dd; border-radius:10px;
    font-size:13.5px; color:#5a5448; font-style:italic; text-align:center}
  .disc{font-size:10.5px; color:var(--mute); text-align:center; margin:22px 16px 0; line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="title"><span class="ji">刀</span><span class="dun">盾</span>工作台</div>
  <div class="sub">琰哥框架 · 持仓逻辑与下周预案一屏掌握</div>
  <div class="updated" id="upd"></div>
</header>

<div class="tabs">
  <div class="tab on" data-p="hold">持仓诊断</div>
  <div class="tab" data-p="sig">信号速览</div>
</div>

<!-- ============ 持仓诊断 ============ -->
<div class="page on" id="hold">

    <div class="pcell shield"><div class="lab">盾 · 防御仓</div><div class="val" id="shPct">—</div><div class="hint">长线底仓,每日做T</div></div>
  </div>
  <div id="cards"></div>
</div>

<!-- ============ 信号速览 ============ -->
<div class="page" id="sig">

  <div class="sig-hd">本周定调</div>
  <div class="tempo">
    <div class="big" id="tempoBig"></div>
    <div class="desc" id="tempoDesc"></div>
  </div>

  <div class="sig-hd">当前周期</div>
  <div class="cyc" id="cyc"></div>

  <div class="sig-hd">总龙头预警</div>
  <div id="alertBox"></div>

  <div class="sig-hd">下周三剧本</div>
  <div id="plays"></div>

  <div class="sig-hd">风格切换候选方向</div>
  <div id="dirs"></div>

  <div class="sig-hd">主线状态</div>
  <div id="mainlines"></div>

  <div class="sig-hd">关键时间点</div>
  <div id="timepts"></div>

  <div class="sig-hd">名词词典 · 点击展开</div>
  <div id="dict"></div>

  <div class="quote" id="quote"></div>
</div>

<div class="disc">仅为个人学习笔记 · 不构成任何投资建议 · 数据时点见顶部</div>

document.getElementById('upd').textContent = "数据时点 · " + DATA.updated;
document.getElementById('swPct').textContent = DATA.posture.sword;
document.getElementById('shPct').textContent = DATA.posture.shield;

const actCls = {hold:'hold', add:'add', watch:'watch', cut:'cut'};
document.getElementById('cards').innerHTML = DATA.holdings.map(h => `
  <div class="card ${h.logicOn?'':'dead'}">
    <div class="crow">
      <div><span class="name">${h.name}</span><span class="code">${h.code}</span></div>
      <span class="tag ${h.role}">${h.role==='sword'?'剑 进攻':'盾 防御'}</span>
    </div>
    <div class="line2"><span class="chip">主线 <b>${h.mainline}</b></span><span class="chip">${h.mainState}</span></div>
    <div class="logic ${h.logicOn?'on':'off'}"><span class="k">${h.logicOn?'逻辑还在':'逻辑已破'}</span> · ${h.logic}</div>
    <div class="foot"><div class="hold"><b>${h.holdType}</b> · ${h.holdHint}</div>
      <span class="act ${actCls[h.action]}">${h.actionTxt}</span></div>
    <div class="panic">⚠ ${h.panic}</div>
  </div>`).join('');

document.getElementById('tempoBig').textContent = DATA.tempoBig;
document.getElementById('tempoDesc').textContent = DATA.tempoDesc;

const cycles = [
  {k:"A", t:"双吹风", d:"3-4月·最强"}, {k:"B", t:"单吹风", d:"5-10月·题材"}, {k:"C", t:"埋伏期", d:"10-12月·赌预期"}
];
document.getElementById('cyc').innerHTML = cycles.map(c=>`
  <div class="${c.k===DATA.cycle?'on':''}"><span class="big">${c.t}</span>${c.d}</div>`).join('');

  <div class="alert"><div class="ah">⚠ ${DATA.alert.title}</div><div class="abody">${DATA.alert.body}</div></div>`;

document.getElementById('plays').innerHTML = DATA.plays.map(p=>`
  <div class="play ${p.cls}">
    <div class="ph"><span class="pn">${p.n}</span><span class="prob">${p.prob}</span></div>
    <div class="pbody">${p.body}</div><div class="pact">${p.act}</div>
  </div>`).join('');

document.getElementById('dirs').innerHTML = DATA.dirs.map(d=>`
  <div class="dir">
    <div class="dh"><span class="rank">${d.rank}</span><span class="dn">${d.n}</span><span class="dbadge">${d.badge}</span></div>
    <div class="dbody">${d.body}</div><div class="dkey">${d.key}</div>
  </div>`).join('');

document.getElementById('mainlines').innerHTML = DATA.mainlines.map(m=>`
  <div class="mainline"><span class="dot" style="background:${lvColor[m.level]}"></span>
    <div><div class="nm">${m.name}</div><div class="st">${m.state}</div></div>
    <span class="badge" style="background:${lvBadge[m.level]};color:${lvBadgeT[m.level]}">${m.badge}</span>

document.getElementById('dict').innerHTML = DATA.dict.map((d,i)=>`
  <div class="dict-item" data-i="${i}">
    <div class="dict-q">${d.q}<span class="badge">${d.badge}</span><span class="arr">▶</span></div>
    <div class="dict-a"><div class="a-inner dict-a-inner">${d.a}</div></div>
  </div>`).join('');

document.getElementById('quote').textContent = DATA.quote;

// 词典点击展开
document.querySelectorAll('.dict-item').forEach(item=>{
  item.querySelector('.dict-q').addEventListener('click',()=>item.classList.toggle('open'));
});

// tab切换
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById(tab.dataset.p).classList.add('on');
    window.scrollTo(0,0);
  });
});
</script>
